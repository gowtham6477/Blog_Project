{% extends "base.html" %}

{% block title %}Sign in · DevJournal{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="prose">
            <h2>Sign in</h2>
            <form method="post" class="stack">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <label>
                    Username
                    {{ form.username }}
                </label>
                <label>
                    Password
                    {{ form.password }}
                </label>
                <button class="button" type="submit">Sign in</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
